version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=lms_db
      - POSTGRES_USER=lms_user
      - POSTGRES_PASSWORD=lms_password
    networks:
      - lms_net

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"  # <--- Pastikan ada baris ini
    environment:
      - DB_NAME=lms_db
      - DB_USER=lms_user
      - DB_PASS=lms_password
      - DB_HOST=db    # <--- Pastikan ini "db"
    depends_on:
      - db
    networks:
      - lms_net

volumes:
  postgres_data:

networks:
  lms_net:
    driver: bridge